spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888/}
  cloud:
    gateway:
      routes:
        - id: vets-service
          uri: lb://vets-service
          predicates:
            - Path=/api/vet/**
          filters:
            - StripPrefix=2
        - id: visits-service
          uri: lb://visits-service
          predicates:
            - Path=/api/visit/**
          filters:
            - StripPrefix=2
        - id: customers-service
          uri: lb://customers-service
          predicates:
            - Path=/api/customer/**
          filters:
            - StripPrefix=2



---
spring:
  config:
    activate:
      on-profile: docker
    import: configserver:http://config-server:8888
  security:
    oauth2:
      client:
        registration:
          login-client:
            provider: authz
            client-id: gateway
            client-secret: secret3
            authorization-grant-type: client_credentials
            redirect-uri-template: "{baseUrl}/"
            scope: gateway
        provider:
          authz:
            authorization-uri: http://localhost:9000/oauth2/authorize
            token-uri: http://localhost:9000/oauth2/token
            user-info-uri: http://localhost:9000/oauth2/userinfo
            user-name-attribute: sub
            jwk-set-uri: http://localhost:9000/oauth2/token_keys
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9000
